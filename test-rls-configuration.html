<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Configuration RLS - JuristDZ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #f59e0b; margin-bottom: 10px; font-size: 2em; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
        .config-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .config-section h2 {
            color: #f59e0b;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.95em;
        }
        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            color: #fcd34d;
        }
        .info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }
        button {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }
        button:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }
        .spinner {
            border: 3px solid #334155;
            border-top: 3px solid #f59e0b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        pre {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 0.85em;
        }
        .test-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .test-item h3 {
            color: #cbd5e1;
            margin-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-enabled {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid #22c55e;
        }
        .status-disabled {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Test Configuration RLS</h1>
        <p class="subtitle">Vérification complète de la sécurité et des policies</p>
        
        <div class="config-section">
            <h2>⚙️ Configuration Supabase</h2>
            <button onclick="testConfig()">Tester Configuration</button>
            <div id="config-result"></div>
        </div>
        
        <div class="config-section">
            <h2>🛡️ Statut RLS</h2>
            <button onclick="testRLS()">Vérifier RLS</button>
            <div id="rls-result"></div>
        </div>
        
        <div class="config-section">
            <h2>📋 Policies</h2>
            <button onclick="testPolicies()">Vérifier Policies</button>
            <div id="policies-result"></div>
        </div>
        
        <div class="config-section">
            <h2>⚡ Fonctions</h2>
            <button onclick="testFunctions()">Vérifier Fonctions</button>
            <div id="functions-result"></div>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let SUPABASE_URL = 'https://fcteljnmcdelbratudnc.supabase.co';
        let SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjdGVsam5tY2RlbGJyYXR1ZG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTkzMDQsImV4cCI6MjA4NTE5NTMwNH0.jbWM24_1ernpGVHS7i32Jx0W9K7yx8WdCLqq42tzwOo';
        
        // Initialisation au chargement
        window.addEventListener('DOMContentLoaded', () => {
            if (SUPABASE_URL && SUPABASE_ANON_KEY) {
                try {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    document.getElementById('config-result').innerHTML = `
                        <div class="test-result success">
                            <strong>✅ Configuration initialisée</strong>
                            <p>URL: ${SUPABASE_URL}</p>
                            <p>Vous pouvez maintenant utiliser les boutons de test.</p>
                        </div>
                    `;
                    console.log('✅ Supabase client créé');
                } catch (error) {
                    document.getElementById('config-result').innerHTML = `
                        <div class="test-result error">
                            <strong>❌ Erreur</strong>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            } else {
                document.getElementById('config-result').innerHTML = `
                    <div class="test-result warning">
                        <strong>⚠️ Configuration manquante</strong>
                        <p>Rechargez la page et entrez vos credentials.</p>
                    </div>
                `;
            }
        });
        
        function testConfig() {
            if (!supabaseClient) {
                alert('❌ Supabase non initialisé. Rechargez la page.');
                return;
            }
            
            document.getElementById('config-result').innerHTML = `
                <div class="test-result success">
                    <strong>✅ Configuration OK</strong>
                    <pre>URL: ${SUPABASE_URL}
Key Length: ${SUPABASE_ANON_KEY.length} caractères</pre>
                </div>
            `;
        }
        
        async function testRLS() {
            if (!supabaseClient) {
                alert('❌ Supabase non initialisé. Rechargez la page.');
                return;
            }
            
            const resultDiv = document.getElementById('rls-result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Test en cours...</div>';
            
            const tables = ['profiles', 'cases', 'documents', 'subscriptions'];
            let html = '';
            
            for (const table of tables) {
                try {
                    const { data, error } = await supabaseClient
                        .from(table)
                        .select('*', { count: 'exact', head: true });
                    
                    if (error) {
                        if (error.message.includes('row-level security') || error.message.includes('policy')) {
                            html += `
                                <div class="test-item">
                                    <strong>${table}</strong>
                                    <span class="status-badge status-enabled">RLS ACTIVÉ ✅</span>
                                    <p style="margin-top: 5px; font-size: 0.85em; color: #94a3b8;">
                                        ${error.message}
                                    </p>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="test-item">
                                    <strong>${table}</strong>
                                    <span class="status-badge status-disabled">ERREUR ⚠️</span>
                                    <p style="margin-top: 5px; font-size: 0.85em;">${error.message}</p>
                                </div>
                            `;
                        }
                    } else {
                        html += `
                            <div class="test-item">
                                <strong>${table}</strong>
                                <span class="status-badge status-disabled">RLS DÉSACTIVÉ ⚠️</span>
                                <p style="margin-top: 5px; font-size: 0.85em;">
                                    La requête a réussi sans authentification
                                </p>
                            </div>
                        `;
                    }
                } catch (err) {
                    html += `
                        <div class="test-item">
                            <strong>${table}</strong>
                            <span class="status-badge status-disabled">ERREUR ❌</span>
                            <p style="margin-top: 5px; font-size: 0.85em;">${err.message}</p>
                        </div>
                    `;
                }
            }
            
            resultDiv.innerHTML = html;
        }
        
        async function testPolicies() {
            if (!supabaseClient) {
                alert('❌ Supabase non initialisé. Rechargez la page.');
                return;
            }
            
            const resultDiv = document.getElementById('policies-result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Test en cours...</div>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .limit(1);
                
                if (error && (error.message.includes('row-level security') || error.message.includes('policy'))) {
                    resultDiv.innerHTML = `
                        <div class="test-result success">
                            <strong>✅ Policies actives</strong>
                            <p>RLS et policies fonctionnent correctement.</p>
                            <pre>${error.message}</pre>
                        </div>
                    `;
                } else if (!error) {
                    resultDiv.innerHTML = `
                        <div class="test-result warning">
                            <strong>⚠️ Policies manquantes</strong>
                            <p>La requête a réussi sans authentification.</p>
                            <p>Vérifiez dans Supabase Dashboard → Authentication → Policies</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="test-result error">
                            <strong>❌ Erreur</strong>
                            <pre>${error.message}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="test-result error">
                        <strong>❌ Erreur</strong>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }
        
        async function testFunctions() {
            if (!supabaseClient) {
                alert('❌ Supabase non initialisé. Rechargez la page.');
                return;
            }
            
            const resultDiv = document.getElementById('functions-result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Test en cours...</div>';
            
            const functions = [
                { name: 'is_admin', params: {} },
                { name: 'check_document_quota', params: { user_id_param: '00000000-0000-0000-0000-000000000000' } },
                { name: 'increment_document_usage', params: { user_id_param: '00000000-0000-0000-0000-000000000000' } }
            ];
            
            let html = '';
            
            for (const func of functions) {
                try {
                    const { data, error } = await supabaseClient.rpc(func.name, func.params);
                    
                    if (error) {
                        if (error.message.includes('does not exist')) {
                            html += `
                                <div class="test-item">
                                    <h3>${func.name}()</h3>
                                    <div class="test-result error">
                                        <strong>❌ Fonction non trouvée</strong>
                                        <p>Exécutez supabase-step2-no-rls.sql</p>
                                    </div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="test-item">
                                    <h3>${func.name}()</h3>
                                    <div class="test-result warning">
                                        <strong>⚠️ Fonction existe mais erreur</strong>
                                        <p>${error.message}</p>
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        html += `
                            <div class="test-item">
                                <h3>${func.name}()</h3>
                                <div class="test-result success">
                                    <strong>✅ Fonction OK</strong>
                                    ${data !== null && data !== undefined ? `<p>Résultat: ${JSON.stringify(data)}</p>` : ''}
                                </div>
                            </div>
                        `;
                    }
                } catch (error) {
                    html += `
                        <div class="test-item">
                            <h3>${func.name}()</h3>
                            <div class="test-result error">
                                <strong>❌ Erreur</strong>
                                <pre>${error.message}</pre>
                            </div>
                        </div>
                    `;
                }
            }
            
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
