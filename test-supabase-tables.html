<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Supabase - JuristDZ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .success {
            background: #1a3a1a;
            border-color: #10B981;
        }
        .error {
            background: #3a1a1a;
            border-color: #DC2626;
        }
        .warning {
            background: #3a3a1a;
            border-color: #D97706;
        }
        button {
            background: #D97706;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #B45309;
        }
        pre {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        h1 { color: #D97706; }
        h2 { color: #10B981; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🧪 Test de Configuration Supabase - JuristDZ</h1>
    
    <div id="config-info"></div>
    
    <h2>Tests Automatiques</h2>
    <button id="btnRunTests">▶️ Lancer tous les tests</button>
    <button onclick="location.reload()">🔄 Rafraîchir</button>
    
    <div id="results"></div>

    <h2>Actions Admin</h2>
    <button id="btnCreateAdmin">👤 Créer le compte admin</button>
    <button id="btnCreateTests">👥 Créer des comptes de test</button>
    
    <div id="admin-results"></div>

    <script>
        console.log('📜 Script chargé');

        
        // Configuration
        const SUPABASE_URL = 'https://fcteljnmcdelbratudnc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjdGVsam5tY2RlbGJyYXR1ZG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTkzMDQsImV4cCI6MjA4NTE5NTMwNH0.jbWM24_1ernpGVHS7i32Jx0W9K7yx8WdCLqq42tzwOo';
        
        let supabaseClient = null;
        
        // Initialiser Supabase
        function initSupabase() {
            console.log('🔄 Initialisation Supabase...');
            
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Bibliothèque Supabase non chargée');
                showError('config-info', 'Bibliothèque Supabase non chargée. Vérifiez votre connexion internet.');
                return false;
            }
            
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Client Supabase créé');
                showConfig();
                return true;
            } catch (error) {
                console.error('❌ Erreur:', error);
                showError('config-info', error.message);
                return false;
            }
        }
        
        // Afficher la configuration
        function showConfig() {
            document.getElementById('config-info').innerHTML = `
                <div class="test-result warning">
                    <strong>📋 Configuration Supabase</strong><br>
                    URL: ${SUPABASE_URL}<br>
                    Clé: ${SUPABASE_ANON_KEY.substring(0, 50)}...<br>
                    <span style="color: #10B981;">✅ Client initialisé</span>
                </div>
            `;
        }
        
        // Afficher une erreur
        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `
                <div class="test-result error">
                    <strong>❌ ERREUR</strong><br>
                    ${message}
                </div>
            `;
        }
        
        // Ajouter un résultat
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        // Ajouter un résultat admin
        function addAdminResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            document.getElementById('admin-results').appendChild(div);
        }

        
        // Test de connexion
        async function testConnection() {
            try {
                const { data, error } = await supabaseClient.from('profiles').select('count');
                if (error) throw error;
                addResult('✅ <strong>Connexion Supabase</strong>: OK', 'success');
                return true;
            } catch (error) {
                addResult(`❌ <strong>Connexion Supabase</strong>: ${error.message}`, 'error');
                return false;
            }
        }
        
        // Test d'une table
        async function testTable(tableName) {
            try {
                const { data, error } = await supabaseClient.from(tableName).select('*').limit(1);
                if (error) throw error;
                addResult(`✅ <strong>Table "${tableName}"</strong>: Existe`, 'success');
                return true;
            } catch (error) {
                if (error.message.includes('does not exist')) {
                    addResult(`❌ <strong>Table "${tableName}"</strong>: N'existe pas`, 'error');
                } else {
                    addResult(`⚠️ <strong>Table "${tableName}"</strong>: ${error.message}`, 'warning');
                }
                return false;
            }
        }
        
        // Test d'une fonction
        async function testFunction(functionName) {
            try {
                const { data, error } = await supabaseClient.rpc(functionName);
                if (error) throw error;
                addResult(`✅ <strong>Fonction "${functionName}"</strong>: Existe`, 'success');
                return true;
            } catch (error) {
                if (error.message.includes('does not exist')) {
                    addResult(`❌ <strong>Fonction "${functionName}"</strong>: N'existe pas`, 'error');
                } else {
                    addResult(`⚠️ <strong>Fonction "${functionName}"</strong>: ${error.message}`, 'warning');
                }
                return false;
            }
        }
        
        // Lancer tous les tests
        async function runAllTests() {
            if (!supabaseClient) {
                addResult('❌ Client Supabase non initialisé', 'error');
                return;
            }
            
            document.getElementById('results').innerHTML = '<h3>🔍 Tests en cours...</h3>';
            
            await testConnection();
            await testTable('profiles');
            await testTable('cases');
            await testTable('documents');
            await testTable('subscriptions');
            await testFunction('is_admin');
            await testFunction('check_document_quota');
            
            addResult('<strong>✅ Tests terminés!</strong>', 'success');
        }

        
        // Créer le compte admin
        async function createAdminAccount() {
            if (!supabaseClient) {
                addAdminResult('❌ Client Supabase non initialisé', 'error');
                return;
            }
            
            document.getElementById('admin-results').innerHTML = '<h3>👤 Création du compte admin...</h3>';
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: 'admin@juristdz.com',
                    password: 'Admin2024!JuristDZ',
                    options: {
                        data: {
                            first_name: 'Admin',
                            last_name: 'JuristDZ',
                            profession: 'avocat'
                        }
                    }
                });
                
                if (error) throw error;
                
                addAdminResult(`✅ <strong>Compte admin créé!</strong><br>
                    Email: admin@juristdz.com<br>
                    Mot de passe: Admin2024!JuristDZ<br>
                    ID: ${data.user.id}`, 'success');
                
                addAdminResult(`⚠️ <strong>Action requise:</strong><br>
                    Allez dans Supabase SQL Editor et exécutez:<br>
                    <pre>UPDATE public.profiles SET is_admin = true WHERE email = 'admin@juristdz.com';</pre>`, 'warning');
                
            } catch (error) {
                if (error.message.includes('already registered')) {
                    addAdminResult(`⚠️ <strong>Compte existe déjà</strong><br>
                        Email: admin@juristdz.com<br>
                        Mot de passe: Admin2024!JuristDZ`, 'warning');
                } else {
                    addAdminResult(`❌ <strong>Erreur:</strong> ${error.message}`, 'error');
                }
            }
        }
        
        // Créer les comptes de test
        async function createTestAccounts() {
            if (!supabaseClient) {
                addAdminResult('❌ Client Supabase non initialisé', 'error');
                return;
            }
            
            document.getElementById('admin-results').innerHTML = '<h3>👥 Création des comptes de test...</h3>';
            
            const accounts = [
                { email: 'ahmed.benali@test.dz', firstName: 'Ahmed', lastName: 'Benali', profession: 'avocat' },
                { email: 'sarah.khelifi@test.dz', firstName: 'Sarah', lastName: 'Khelifi', profession: 'avocat' },
                { email: 'mohamed.ziani@test.dz', firstName: 'Mohamed', lastName: 'Ziani', profession: 'notaire' },
                { email: 'karim.djahid@test.dz', firstName: 'Karim', lastName: 'Djahid', profession: 'huissier' }
            ];
            
            for (const account of accounts) {
                try {
                    const { data, error } = await supabaseClient.auth.signUp({
                        email: account.email,
                        password: 'test123',
                        options: {
                            data: {
                                first_name: account.firstName,
                                last_name: account.lastName,
                                profession: account.profession
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    addAdminResult(`✅ <strong>${account.firstName} ${account.lastName}</strong><br>
                        Email: ${account.email}<br>
                        Mot de passe: test123<br>
                        Profession: ${account.profession}`, 'success');
                    
                } catch (error) {
                    if (error.message.includes('already registered')) {
                        addAdminResult(`⚠️ <strong>${account.firstName} ${account.lastName}</strong>: Compte existe déjà`, 'warning');
                    } else {
                        addAdminResult(`❌ <strong>${account.firstName} ${account.lastName}</strong>: ${error.message}`, 'error');
                    }
                }
            }
            
            addAdminResult('<strong>✅ Création terminée!</strong>', 'success');
        }
        
        // Initialisation au chargement
        window.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 Page chargée');
            
            if (initSupabase()) {
                console.log('✅ Prêt');
                
                // Attacher les événements
                document.getElementById('btnRunTests').addEventListener('click', runAllTests);
                document.getElementById('btnCreateAdmin').addEventListener('click', createAdminAccount);
                document.getElementById('btnCreateTests').addEventListener('click', createTestAccounts);
                
                // Lancer les tests automatiquement
                setTimeout(runAllTests, 500);
            } else {
                console.error('❌ Échec initialisation');
            }
        });
        
        console.log('✅ Script prêt');
    </script>
</body>
</html>
